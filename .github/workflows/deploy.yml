name: Deploy Documentation

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - docs-updated
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4

      - name: Checkout efko-kernel repository
        uses: actions/checkout@v4
        with:
          repository: mrfrend/efko-kernel
          path: efko-kernel
          ref: develop
          token: ${{ secrets.EFKO_KERNEL_ACCESS }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug - list efko-kernel contents
        run: find efko-kernel -type d -maxdepth 3

      - name: Copy documentation from efko-kernel
        run: |
          rm -rf docs
          cp -r efko-kernel/docs docs

      - name: Build documentation
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
